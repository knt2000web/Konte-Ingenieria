<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Structo Pro - Official Identity</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090b10;
      --bg-light: #ffffff;
      --text-dark: #0f172a;
      --text-light: #f8fafc;
      --accent-blue: #1458f5;
      --accent-gold: #f5c842;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Glowing Lights */
    .glow-bg {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(20,88,245,0.15) 0%, rgba(9,11,16,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    .glow-gold {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,200,66,0.08) 0%, rgba(9,11,16,0) 70%);
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* Container */
    .presentation-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 80px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      text-align: center;
      max-width: 900px;
      width: 90%;
    }

    /* Logo Icon Container */
    .logo-icon {
      width: 240px;
      height: 240px;
      margin-bottom: 40px;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-icon:hover {
      transform: scale(1.05) translateY(-10px);
    }

    /* Typography */
    .brand-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -1.5px;
      color: #ffffff;
      margin-bottom: 16px;
      text-transform: uppercase;
      line-height: 1;
    }

    .brand-name span {
      color: var(--accent-blue);
      position: relative;
    }
    
    .brand-name span::after {
      content: '.';
      color: var(--accent-gold);
    }

    .slogan-box {
      background: linear-gradient(90deg, rgba(20,88,245,0.1) 0%, rgba(20,88,245,0.05) 100%);
      border-left: 4px solid var(--accent-blue);
      padding: 16px 24px;
      border-radius: 0 12px 12px 0;
      margin-top: 24px;
    }

    .slogan {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    .slogan strong {
      color: #ffffff;
      font-weight: 600;
    }

    /* Light Theme Toggle Button for Preview */
    .theme-toggle {
      position: absolute;
      top: 40px;
      right: 40px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      cursor: pointer;
      font-family: 'Inter';
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .theme-toggle:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Light Theme Classes */
    body.light-theme {
      background-color: var(--bg-light);
      color: var(--text-dark);
    }

    body.light-theme .presentation-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 30px 60px rgba(0,0,0,0.08);
    }

    body.light-theme .brand-name {
      color: var(--text-dark);
    }

    body.light-theme .slogan {
      color: #475569;
    }
    
    body.light-theme .slogan strong {
      color: var(--text-dark);
    }

    body.light-theme .glow-bg, body.light-theme .glow-gold {
      opacity: 0.4;
    }

    body.light-theme .theme-toggle {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      color: #0f172a;
    }

    /* SVG Hover effects for inner parts */
    .svg-part {
      transition: all 0.3s ease;
    }
    .svg-part:hover {
      filter: brightness(1.2);
    }

  </style>
</head>
<body>

  <div class="glow-bg"></div>
  <div class="glow-gold"></div>

  <button class="theme-toggle" onclick="document.body.classList.toggle('light-theme')">Cambiar a Fondo Claro</button>

  <div class="presentation-card">
    
    <!-- SVG LOGO -->
    <div class="logo-icon">
      <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Core Gold Gradient -->
          <linearGradient id="coreGrad" x1="200" y1="140" x2="200" y2="260" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffdf70" />
            <stop offset="50%" stop-color="#f5c842" />
            <stop offset="100%" stop-color="#cc9b14" />
          </linearGradient>
          
          <!-- Top Blue Gradient (Glass/Steel) -->
          <linearGradient id="topGrad" x1="200" y1="40" x2="200" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3b78ff" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#0a2d99" stop-opacity="0.95" />
          </linearGradient>

          <!-- Left Navy Gradient -->
          <linearGradient id="leftGrad" x1="61" y1="160" x2="165" y2="340" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1e293b" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#020617" stop-opacity="0.95" />
          </linearGradient>

          <!-- Right Silver/Grey Gradient -->
          <linearGradient id="rightGrad" x1="235" y1="160" x2="339" y2="340" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#334155" stop-opacity="0.95" />
          </linearGradient>

          <!-- Shadows -->
          <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
          </filter>
        </defs>

        <!-- ==========================================
             THE CORE (Solid BIM/Budget Data Center)
             ========================================== -->
        <g class="svg-part">
          <!-- Core Top -->
          <polygon points="200,140 252,170 200,200 148,170" fill="url(#coreGrad)" opacity="0.9"/>
          <!-- Core Left -->
          <polygon points="148,170 200,200 200,260 148,230" fill="url(#coreGrad)" filter="brightness(0.7)"/>
          <!-- Core Right -->
          <polygon points="200,200 252,170 252,230 200,260" fill="url(#coreGrad)" filter="brightness(0.85)"/>
        </g>

        <!-- ==========================================
             RIGHT FACE (Steel / Engineering Norms)
             ========================================== -->
        <g class="svg-part" filter="url(#dropShadow)">
          <polygon points="235,220 339,160 339,280 235,340" fill="url(#rightGrad)" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>
          <!-- CAD Tech Lines -->
          <line x1="287" y1="190" x2="287" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
          <line x1="235" y1="280" x2="339" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
        </g>

        <!-- ==========================================
             LEFT FACE (Foundation / Encofrado)
             ========================================== -->
        <g class="svg-part" filter="url(#dropShadow)">
          <polygon points="61,160 165,220 165,340 61,280" fill="url(#leftGrad)" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
          <!-- CAD Tech Lines -->
          <line x1="113" y1="190" x2="113" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
          <line x1="61" y1="220" x2="165" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
        </g>

        <!-- ==========================================
             TOP FACE (Architecture / 3D Model / Roof)
             ========================================== -->
        <g class="svg-part" filter="url(#dropShadow)">
          <polygon points="200,40 304,100 200,160 96,100" fill="url(#topGrad)" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round"/>
          <!-- CAD Tech Lines -->
          <line x1="200" y1="40" x2="200" y2="160" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          <line x1="96" y1="100" x2="304" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          
          <!-- Central Node Dot -->
          <circle cx="200" cy="100" r="6" fill="#f5c842"/>
        </g>
        
      </svg>
    </div>

    <!-- BRAND TEXT -->
    <div class="brand-name">Structo<span>Pro</span></div>
    
    <!-- SLOGAN -->
    <div class="slogan-box">
      <div class="slogan">La norma es el límite. <strong>Structo Pro es la herramienta.</strong></div>
    </div>

  </div>

</body>
</html>
